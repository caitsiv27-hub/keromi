<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Keromi Assistant</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="chat-container">

<div class="chat-header">
  <div>
    <strong>Keromi Assistant</strong><br>
    <span style="font-size:12px; opacity:0.8;">Innovation for Africa</span>
  </div>
</div>

  <div id="messages" class="chat-messages"></div>

  <div class="chat-input">
    <input id="input" type="text" placeholder="Ask us anything..." />
    <button onclick="sendMessage()">Send</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
